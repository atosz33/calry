services:
  backend:
    build:
      context: ./backend
    container_name: calry-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: sqlite:////data/calry.db
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-preview}
    ports:
      - "127.0.0.1:5001:5001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: calry-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:8081"
